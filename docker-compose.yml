services:
  postgres:
    image: postgres:16-alpine
    container_name: flylink-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-flylink}
      POSTGRES_USER: ${DB_USERNAME:-flylink}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flylink123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-flylink}" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
